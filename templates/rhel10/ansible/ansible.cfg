[defaults]
display_skipped_hosts = false
interpreter_python = auto_silent
# verbosity = 1
host_key_checking = False
# stdout_callback = yaml
timeout = 30
# Enable task timing - shows duration of each task
# callbacks_enabled = ansible.posix.profile_tasks, ansible.posix.timer
# Log with timestamps
log_path = /tmp/ansible-packer.log
show_task_path_on_failure = true

[callback_profile_tasks]
# Show timestamps for each task
task_output_limit = 100
sort_order = none

[ssh_connection]
ssh_args = -C -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=3
pipelining = False
scp_extra_args = "-O"
# Retry SSH connections on transient network failures
retries = 3
