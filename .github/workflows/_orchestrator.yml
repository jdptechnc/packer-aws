# .github/workflows/_orchestrator.yml
# =============================================================================
# Orchestrator workflow
#
# Responsibilities:
#   - Determine WHICH AMI templates to build
#   - Expand a matrix of templates
#   - Invoke the reusable AMI build workflow once per template
#
# This workflow contains *no* build logic.
# =============================================================================

name: "[Orchestrator] Build AMIs"

on:
  workflow_call:
    inputs:
      templates:
        description: >
          Templates to build:
            - "all"            → all scheduled templates
            - "linux"          → all Linux templates
            - "rhel10"         → single template
            - "rhel10,al2023"  → subset
        type: string
        default: "all"

      aws_region:
        type: string
        default: "us-east-1"

      packer_log:
        type: string
        default: "0"

      use_spot:
        type: boolean
        default: true

      oidc_role_arn:
        description: "OIDC role ARN (empty = explicit creds)"
        type: string
        default: ""

    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_SESSION_TOKEN:
        required: false
      GH_PAT:
        required: true
      ANSIBLE_VAULT_PASSWORD:
        required: true

jobs:
  resolve-matrix:
    name: Resolve template matrix
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Build matrix from template registry
        id: matrix
        run: |
          set -euo pipefail

          REGISTRY=".github/template-registry.json"
          FILTER="${{ inputs.templates }}"

          echo "Template selector: ${FILTER}"

          if [ "${FILTER}" = "all" ]; then
            MATRIX=$(jq -c '{include: [.templates[] | select(.schedule == true)]}' "${REGISTRY}")

          elif [ "${FILTER}" = "linux" ] || [ "${FILTER}" = "windows" ]; then
            MATRIX=$(jq -c --arg f "${FILTER}" \
              '{include: [.templates[] | select(.os_family == $f)]}' "${REGISTRY}")

          else
            IFS=',' read -ra IDS <<< "${FILTER}"
            IDS_JSON=$(printf '"%s",' "${IDS[@]}")
            IDS_JSON="[${IDS_JSON%,}]"

            MATRIX=$(jq -c --argjson ids "${IDS_JSON}" \
              '{include: [.templates[] | select(.id as $id | $ids | index($id))]}' \
              "${REGISTRY}")
          fi

          echo "Resolved matrix:"
          echo "${MATRIX}" | jq .

          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    name: Build AMI(s)
    needs: resolve-matrix

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-matrix.outputs.matrix) }}

    uses: ./.github/workflows/_build-ami-reusable.yml
    with:
      template_id: ${{ matrix.id }}
      template_name: ${{ matrix.name }}
      template_dir: ${{ matrix.dir }}
      os_family: ${{ matrix.os_family }}
      runner_instance_type: ${{ matrix.runner_instance_type }}
      build_timeout: ${{ matrix.build_timeout }}

      aws_region: ${{ inputs.aws_region }}
      packer_log: ${{ inputs.packer_log }}
      use_spot: ${{ inputs.use_spot }}
      oidc_role_arn: ${{ inputs.oidc_role_arn }}

    secrets: inherit