# .github/workflows/_orchestrator.yml
# =============================================================================
# [INTERNAL] Orchestrator workflow
#
# Determines WHICH AMI templates to build, expands a matrix, and invokes
# the reusable build workflow once per template. Each matrix entry gets its
# own EC2 self-hosted runner.
#
# This workflow contains NO build logic. Do not call directly.
# =============================================================================

name: "[INTERNAL] Orchestrator"

on:
  workflow_call:
    inputs:
      templates:
        description: >
          Templates to build:
            "all"            → all templates with schedule: true
            "linux"          → all Linux templates
            "rhel10"         → single template by ID
            "rhel10,al2023"  → comma-separated subset
        type: string
        default: "all"
      version:
        description: 'AMI release version tag (empty = test-<timestamp>)'
        type: string
        default: ''
      aws_region:
        type: string
        default: "us-east-1"
      aws_vpc_id:
        type: string
        default: "vpc-0c8dffe5eac8f64b8"
      aws_subnet_id:
        type: string
        default: "subnet-0ae141380d445b55d"
      packer_log:
        type: string
        default: "0"
      use_spot:
        type: boolean
        default: true
      oidc_role_arn:
        type: string
        default: ""

    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_SESSION_TOKEN:
        required: false
      GH_PAT:
        required: true
      ANSIBLE_VAULT_PASSWORD:
        required: true

jobs:
  # -------------------------------------------------------------------------
  # Resolve the template selector into a concrete matrix
  # -------------------------------------------------------------------------
  resolve-matrix:
    name: Resolve template matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build matrix from template registry
        id: matrix
        run: |
          set -euo pipefail

          REGISTRY=".github/template-registry.json"
          FILTER="${{ inputs.templates }}"

          echo "Template selector: ${FILTER}"

          if [ "${FILTER}" = "all" ]; then
            # Scheduled: build everything marked schedule: true
            MATRIX=$(jq -c '{include: [.templates[] | select(.schedule == true)]}' "${REGISTRY}")

          elif [ "${FILTER}" = "linux" ] || [ "${FILTER}" = "windows" ]; then
            # OS family filter
            MATRIX=$(jq -c --arg f "${FILTER}" \
              '{include: [.templates[] | select(.os_family == $f)]}' "${REGISTRY}")

          else
            # Comma-separated list of template IDs (e.g., "rhel10,al2023")
            IFS=',' read -ra IDS <<< "${FILTER}"
            IDS_JSON=$(printf '"%s",' "${IDS[@]}")
            IDS_JSON="[${IDS_JSON%,}]"
            MATRIX=$(jq -c --argjson ids "${IDS_JSON}" \
              '{include: [.templates[] | select(.id as $id | $ids | index($id))]}' \
              "${REGISTRY}")
          fi

          # Validate we got at least one template
          COUNT=$(echo "${MATRIX}" | jq '.include | length')
          if [ "${COUNT}" -eq 0 ]; then
            echo "ERROR: No templates matched selector '${FILTER}'"
            echo "Available templates:"
            jq -r '.templates[].id' "${REGISTRY}"
            exit 1
          fi

          echo "Resolved ${COUNT} template(s):"
          echo "${MATRIX}" | jq .
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------------
  # Fan out: one reusable build workflow invocation per template
  # Each gets its own EC2 runner, its own Packer build, its own cleanup.
  # -------------------------------------------------------------------------
  build:
    name: "Build ${{ matrix.name }}"
    needs: resolve-matrix
    strategy:
      # Don't cancel other builds if one fails
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-matrix.outputs.matrix) }}

    uses: ./.github/workflows/_build-ami-reusable.yml
    with:
      template_id: ${{ matrix.id }}
      template_name: ${{ matrix.name }}
      template_dir: ${{ matrix.dir }}
      os_family: ${{ matrix.os_family }}
      runner_instance_type: ${{ matrix.runner_instance_type }}
      build_timeout: ${{ matrix.build_timeout }}
      version: ${{ inputs.version }}
      aws_region: ${{ inputs.aws_region }}
      aws_vpc_id: ${{ inputs.aws_vpc_id }}
      aws_subnet_id: ${{ inputs.aws_subnet_id }}
      packer_log: ${{ inputs.packer_log }}
      use_spot: ${{ inputs.use_spot }}
      oidc_role_arn: ${{ inputs.oidc_role_arn }}
    secrets: inherit