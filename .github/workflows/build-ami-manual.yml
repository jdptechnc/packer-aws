# .github/workflows/build-ami-manual.yml
# =============================================================================
# Manual trigger for AMI builds
#
# Provides a form in the GitHub UI (Actions → Run workflow).
# Calls the orchestrator, which expands the template selector into a matrix
# and invokes the reusable build workflow once per template.
#
# SECURITY NOTE:
#   workflow_dispatch string inputs are stored in PLAIN TEXT in the workflow
#   run's API metadata. Use short-lived STS credentials for the POC.
#   Migrate to OIDC for production, then delete old runs containing creds:
#     gh run list --workflow=build-ami-manual.yml --limit 100 --json databaseId \
#       | jq -r '.[].databaseId' | xargs -I {} gh run delete {}
# =============================================================================

name: "Build AMI (Manual)"

on:
  workflow_dispatch:
    inputs:
      templates:
        description: >
          Templates to build: "all", "linux", or comma-separated IDs
          (e.g., "rhel10" or "rhel10,al2023")
        required: true
        type: string
        default: 'all'
      version:
        description: >
          AMI release version tag. If empty, defaults to "test-<timestamp>"
          (e.g., "test-20260501T1430Z"). Set explicitly for production builds
          (e.g., "1.0.0", "2026.05").
        required: false
        type: string
        default: ''
      aws_access_key_id:
        description: 'AWS Access Key ID'
        required: true
        type: string
      aws_secret_access_key:
        description: 'AWS Secret Access Key'
        required: true
        type: string
      aws_session_token:
        description: 'AWS Session Token (for temporary STS credentials)'
        required: true
        type: string
      aws_region:
        description: 'AWS Region for the build'
        required: false
        type: string
        default: 'us-east-1'
      aws_vpc_id:
        description: 'VPC ID for runner + build instances'
        required: false
        type: string
        default: 'vpc-0c53ca94f5f3ccf98'
      aws_subnet_id:
        description: 'Subnet ID (must have outbound internet for runner)'
        required: false
        type: string
        default: 'subnet-021f82e53d9618d11'
      packer_log:
        description: 'Enable verbose Packer logging (0=off, 1=on)'
        required: false
        type: choice
        options:
          - '0'
          - '1'
        default: '0'
      use_spot:
        description: 'Use spot instances for runner and Packer build'
        required: false
        type: boolean
        default: true

jobs:
  build:
    uses: ./.github/workflows/_orchestrator.yml
    with:
      templates: ${{ inputs.templates }}
      version: ${{ inputs.version }}
      aws_region: ${{ inputs.aws_region }}
      aws_vpc_id: ${{ inputs.aws_vpc_id }}
      aws_subnet_id: ${{ inputs.aws_subnet_id }}
      packer_log: ${{ inputs.packer_log }}
      use_spot: ${{ inputs.use_spot }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
      AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
      AWS_SESSION_TOKEN: ${{ inputs.aws_session_token }}
      GH_PAT: ${{ secrets.GH_PAT }}
      ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}