# .github/workflows/build-ami-dispatch.yml
# =============================================================================
# API trigger for AMI builds — OIDC authentication
#
# Trigger examples:
#
#   Build all:
#     curl -X POST \
#       -H "Authorization: Bearer ${GITHUB_TOKEN}" \
#       -H "Accept: application/vnd.github+json" \
#       -H "X-GitHub-Api-Version: 2022-11-28" \
#       "https://api.github.com/repos/OWNER/REPO/dispatches" \
#       -d '{"event_type":"build-ami","client_payload":{"templates":"all"}}'
#
#   Build one:
#     ... "client_payload": {"templates": "rhel10", "packer_log": "1"} ...
#
#   Build subset:
#     ... "client_payload": {"templates": "rhel10,al2023"} ...
#
#   All Linux:
#     ... "client_payload": {"templates": "linux"} ...
#
#   From Ansible:
#     - name: Trigger AMI build
#       ansible.builtin.uri:
#         url: "https://api.github.com/repos/{{ org }}/{{ repo }}/dispatches"
#         method: POST
#         headers:
#           Authorization: "Bearer {{ github_token }}"
#           Accept: "application/vnd.github+json"
#           X-GitHub-Api-Version: "2022-11-28"
#         body_format: json
#         body:
#           event_type: "build-ami"
#           client_payload:
#             templates: "{{ templates | default('all') }}"
#         status_code: 204
#
# client_payload fields (all optional):
#   templates   — "all", "linux", "windows", or comma-separated IDs
#   aws_region  — target region (default: us-east-1)
#   packer_log  — "0" or "1" (default: "0")
#   use_spot    — true or false (default: true)
# =============================================================================

name: "Build AMIs (API Dispatch)"

on:
  repository_dispatch:
    types: [build-ami]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_orchestrator.yml
    with:
      templates: ${{ github.event.client_payload.templates || 'all' }}
      aws_region: ${{ github.event.client_payload.aws_region || 'us-east-1' }}
      aws_vpc_id: ${{ github.event.client_payload.aws_vpc_id || 'vpc-0c8dffe5eac8f64b8' }}
      aws_subnet_id: ${{ github.event.client_payload.aws_subnet_id || 'subnet-0ae141380d445b55d' }}
      packer_log: ${{ github.event.client_payload.packer_log || '0' }}
      use_spot: ${{ github.event.client_payload.use_spot != false }}
      oidc_role_arn: ${{ vars.AWS_OIDC_ROLE_ARN }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}