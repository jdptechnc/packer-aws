# .github/workflows/build-rhel10.yml
# Manual-trigger workflow for building RHEL 10 Golden AMI with Packer
#
# Architecture:
#   1. start-runner  — launches an ephemeral AL2023 EC2 instance in the target
#                      VPC and registers it as a GitHub Actions self-hosted runner
#   2. build-ami     — runs Packer ON that runner, SSH to build instance via
#                      private_ip (no SSM, no public IP on build instance)
#   3. stop-runner   — deregisters the runner, terminates runner + any stale
#                      build instances, deletes temporary security group
#
# Prerequisites:
#   - Repository secret GH_PAT: GitHub Personal Access Token (classic) with
#     'repo' scope — used to register/deregister the ephemeral runner
#   - The runner subnet MUST have outbound internet access (NAT gateway or
#     internet gateway with public IP) so the runner can reach GitHub, PyPI,
#     HashiCorp releases, and Ansible Galaxy
#   - AWS credentials with EC2, IAM permissions

name: Build RHEL 10 AMI

on:
  workflow_dispatch:
    inputs:
      aws_access_key_id:
        description: 'AWS Access Key ID'
        required: true
        type: string
      aws_secret_access_key:
        description: 'AWS Secret Access Key'
        required: true
        type: string
      aws_session_token:
        description: 'AWS Session Token (for temporary credentials)'
        required: true
        type: string
      aws_region:
        description: 'AWS Region for the build'
        required: false
        type: string
        default: 'us-east-1'
      aws_vpc_id:
        description: 'VPC ID for runner + build instances'
        required: false
        type: string
        default: vpc-0c8dffe5eac8f64b8
      aws_subnet_id:
        description: 'Subnet ID (must have outbound internet for runner)'
        required: false
        type: string
        default: subnet-0ae141380d445b55d
      packer_log:
        description: 'Enable verbose Packer logging (0=off, 1=on)'
        required: false
        type: choice
        options:
          - '0'
          - '1'
        default: '0'

env:
  PACKER_VERSION: "1.15.2"
  TEMPLATE_DIR: templates/rhel10

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Launch an ephemeral EC2 self-hosted runner in the target VPC
  # -----------------------------------------------------------------------
  start-runner:
    name: Start EC2 runner
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.start-ec2-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}
      runner-sg-id: ${{ steps.runner-sg.outputs.sg_id }}

    env:
      AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
      AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
      AWS_SESSION_TOKEN: ${{ inputs.aws_session_token }}
      AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
      AWS_REGION: ${{ inputs.aws_region }}

    steps:
      - name: Look up latest Amazon Linux 2023 AMI
        id: ami
        run: |
          AMI_ID=$(aws ssm get-parameters \
            --names /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64 \
            --query "Parameters[0].Value" --output text)
          echo "ami_id=${AMI_ID}" >> "$GITHUB_OUTPUT"
          echo "Runner AMI: ${AMI_ID}"

      - name: Create runner security group
        id: runner-sg
        run: |
          SG_ID=$(aws ec2 create-security-group \
            --group-name "gha-runner-${{ github.run_id }}" \
            --description "Ephemeral SG for GitHub Actions runner - run ${{ github.run_id }}" \
            --vpc-id "${{ inputs.aws_vpc_id }}" \
            --query 'GroupId' --output text)
          echo "sg_id=${SG_ID}" >> "$GITHUB_OUTPUT"
          echo "Runner SG: ${SG_ID}"

      - name: Start EC2 runner
        id: start-ec2-runner
        uses: machulav/ec2-github-runner@v2
        with:
          mode: start
          github-token: ${{ secrets.GH_PAT }}
          ec2-image-id: ${{ steps.ami.outputs.ami_id }}
          ec2-instance-type: t3.medium
          subnet-id: ${{ inputs.aws_subnet_id }}
          security-group-id: ${{ steps.runner-sg.outputs.sg_id }}
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "gha-runner-${{ github.run_id }}"},
              {"Key": "GitHubRunId", "Value": "${{ github.run_id }}"},
              {"Key": "Purpose", "Value": "packer-runner"}
            ]
          pre-runner-script: |
            dnf install -y git libicu python3-pip unzip

  # -----------------------------------------------------------------------
  # Job 2: Build the AMI on the self-hosted runner (same VPC, direct SSH)
  # -----------------------------------------------------------------------
  build-ami:
    name: Build RHEL 10 Golden AMI
    needs: start-runner
    runs-on: ${{ needs.start-runner.outputs.label }}
    timeout-minutes: 60

    env:
      AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
      AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
      AWS_SESSION_TOKEN: ${{ inputs.aws_session_token }}
      AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
      PACKER_LOG: ${{ inputs.packer_log }}
      PKR_VAR_github_run_id: ${{ github.run_id }}
      ANSIBLE_FORCE_COLOR: "true"
      ANSIBLE_STDOUT_CALLBACK: default
      ANSIBLE_LOAD_CALLBACK_PLUGINS: "true"

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Install Packer
      # ------------------------------------------------------------------
      - name: Install Packer
        run: |
          set -x
          curl -fsSL "https://releases.hashicorp.com/packer/${{ env.PACKER_VERSION }}/packer_${{ env.PACKER_VERSION }}_linux_amd64.zip" \
            -o /tmp/packer.zip
          sudo unzip -o /tmp/packer.zip -d /usr/local/bin/
          rm /tmp/packer.zip
          packer --version
          echo "✓ Packer ${{ env.PACKER_VERSION }} installed"

      # ------------------------------------------------------------------
      # 3. Configure AWS credentials file
      # ------------------------------------------------------------------
      - name: Configure AWS credentials
        run: |
          set -x
          mkdir -p ~/.aws
          {
            echo '[default]'
            echo 'region = ${{ inputs.aws_region }}'
            echo 'output = json'
          } > ~/.aws/config
          {
            echo '[default]'
            echo 'aws_access_key_id = ${{ inputs.aws_access_key_id }}'
            echo 'aws_secret_access_key = ${{ inputs.aws_secret_access_key }}'
            echo 'aws_session_token = ${{ inputs.aws_session_token }}'
          } > ~/.aws/credentials
          chmod 600 ~/.aws/credentials ~/.aws/config
          echo "✓ AWS credentials configured"

      # ------------------------------------------------------------------
      # 4. Verify AWS identity
      # ------------------------------------------------------------------
      - name: Verify AWS credentials
        run: |
          set -x
          aws sts get-caller-identity

      # ------------------------------------------------------------------
      # 5. Setup Ansible venv
      # ------------------------------------------------------------------
      - name: Create Ansible venv and install dependencies
        run: |
          set -x
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          ansible --version
          echo "✓ Ansible venv ready"

      - name: Install Ansible collections
        run: |
          set -x
          source .venv/bin/activate
          ansible-galaxy collection install -v ansible.posix community.general
          echo "✓ Ansible collections installed"

      # ------------------------------------------------------------------
      # 6. Packer init (download plugins)
      # ------------------------------------------------------------------
      - name: Packer init
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: |
          set -x
          source ${{ github.workspace }}/.venv/bin/activate
          packer init .
          echo "✓ Packer init complete"

      # ------------------------------------------------------------------
      # 7. Packer validate
      # ------------------------------------------------------------------
      - name: Packer validate
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: |
          set -x
          source ${{ github.workspace }}/.venv/bin/activate
          packer validate .
          echo "✓ Packer template valid"

      # ------------------------------------------------------------------
      # 8. Packer build
      # ------------------------------------------------------------------
      - name: Packer build
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: |
          set -x
          source ${{ github.workspace }}/.venv/bin/activate
          echo "=== Starting Packer build of RHEL 10 Golden AMI ==="
          echo "Region:    ${{ inputs.aws_region }}"
          echo "VPC ID:    ${{ inputs.aws_vpc_id }}"
          echo "Subnet ID: ${{ inputs.aws_subnet_id }}"
          echo "Interface: private_ip (direct SSH from runner)"
          echo "Verbose:   ${{ inputs.packer_log }}"

          packer_cmd="packer build -color=true -on-error=abort"

          # Direct SSH via private IP — runner is in the same VPC
          packer_cmd="${packer_cmd} -var ssh_interface=private_ip"
          packer_cmd="${packer_cmd} -var associate_public_ip=false"

          # VPC and subnet
          if [ -n "${{ inputs.aws_vpc_id }}" ]; then
            packer_cmd="${packer_cmd} -var 'vpc_id=${{ inputs.aws_vpc_id }}'"
          fi
          if [ -n "${{ inputs.aws_subnet_id }}" ]; then
            packer_cmd="${packer_cmd} -var 'subnet_id=${{ inputs.aws_subnet_id }}'"
          fi

          if [ "${{ inputs.packer_log }}" = "1" ]; then
            echo "Running with verbose output..."
            packer_cmd="${packer_cmd} -debug"
          fi

          packer_cmd="${packer_cmd} ."

          echo "Executing: ${packer_cmd}"
          eval "${packer_cmd}"
          echo "✓ Packer build complete"

      # ------------------------------------------------------------------
      # 9. Upload build manifest as artifact
      # ------------------------------------------------------------------
      - name: Upload manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packer-manifest
          path: ${{ env.TEMPLATE_DIR }}/manifests/*.json
          retention-days: 90

      - name: Show build result
        if: always()
        run: |
          set -x
          echo "=== Build artifacts in manifests directory ==="
          ls -lah ${{ env.TEMPLATE_DIR }}/manifests/ || echo "No manifest files found"

      # ------------------------------------------------------------------
      # 10. Cleanup AWS credentials
      # ------------------------------------------------------------------
      - name: Cleanup credentials
        if: always()
        run: |
          rm -rf ~/.aws
          echo "✓ AWS credentials cleaned up"

  # -----------------------------------------------------------------------
  # Job 3: Stop the runner and clean up all resources
  # -----------------------------------------------------------------------
  stop-runner:
    name: Stop EC2 runner + cleanup
    needs: [start-runner, build-ami]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
      AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
      AWS_SESSION_TOKEN: ${{ inputs.aws_session_token }}
      AWS_DEFAULT_REGION: ${{ inputs.aws_region || 'us-east-1' }}
      AWS_REGION: ${{ inputs.aws_region || 'us-east-1' }}

    steps:
      - name: Stop EC2 runner
        uses: machulav/ec2-github-runner@v2
        if: ${{ needs.start-runner.outputs.ec2-instance-id }}
        with:
          mode: stop
          github-token: ${{ secrets.GH_PAT }}
          label: ${{ needs.start-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-runner.outputs.ec2-instance-id }}

      - name: Delete runner security group
        if: always()
        run: |
          SG_ID="${{ needs.start-runner.outputs.runner-sg-id }}"
          if [ -n "${SG_ID}" ]; then
            echo "Waiting for runner instance to fully terminate..."
            aws ec2 wait instance-terminated \
              --instance-ids "${{ needs.start-runner.outputs.ec2-instance-id }}" \
              2>/dev/null || sleep 30
            aws ec2 delete-security-group --group-id "${SG_ID}" 2>/dev/null \
              && echo "✓ Deleted runner SG: ${SG_ID}" \
              || echo "WARN: Could not delete SG ${SG_ID} (may already be gone)"
          fi

      - name: Terminate stale build instances
        if: always()
        run: |
          set -euo pipefail
          echo "=== Checking for stale build instances (run ID: ${{ github.run_id }}) ==="

          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:GitHubRunId,Values=${{ github.run_id }}" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          if [ -z "${INSTANCE_IDS}" ] || [ "${INSTANCE_IDS}" = "None" ]; then
            echo "No stale build instances found — Packer cleaned up normally."
          else
            echo "Found instances to terminate: ${INSTANCE_IDS}"
            aws ec2 terminate-instances --instance-ids ${INSTANCE_IDS}
            echo "✓ Termination requested for: ${INSTANCE_IDS}"
          fi
